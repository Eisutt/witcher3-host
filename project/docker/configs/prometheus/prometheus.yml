global:
  scrape_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ['localhost:9090']
  - job_name: "node"
    static_configs:
      - targets: ['node_exporter:9100']
  - job_name: "blackbox_nginx"
    metrics_path: /probe
    params:
      module: [http_2xx]  # Используем модуль, который написали в Шаге 2
    static_configs:
      - targets:
        - http://nginx:80 # Куда стучимся (внутренний адрес контейнера Nginx)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115  # Адрес самого Blackbox Exporter