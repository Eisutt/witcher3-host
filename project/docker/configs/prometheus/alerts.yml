groups:
  - name: container_alerts
    rules: 
    - alert: NginxDown
      expr: probe_success{job="blackbox_nginx"} == 0
      for: 1m
      labels: 
        severity: critical
      annotations:
        summary: "Nginx недоступен (Blackbox)"
        description: "Веб-сервер Nginx не отвечает на HTTP-запросы или выдает ошибку. Сайт лежит."