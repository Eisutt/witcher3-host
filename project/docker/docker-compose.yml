
services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      # Директории для certbot
      - ./configs/certbot/conf:/etc/letsencrypt:ro
      - ./configs/certbot/www:/var/www/certbot:ro
    networks: 
      - monitoring_net
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./configs/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment: 
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    networks: 
      - monitoring_net
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks: 
      - monitoring_net
  certbot: 
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./configs/certbot/conf:/etc/letsencrypt
      - ./configs/certbot/www:/var/www/certbot
    networks:
      - monitoring_net
  node_exporter: 
    image: prom/node-exporter
    container_name: node_exporter
    restart: unless-stopped
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command: 
      - '--path.rootfs=/host'
    networks:
      - monitoring_net
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker
      - /dev/disk:/dev/disk
    networks:
      - monitoring_net


volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring_net:
